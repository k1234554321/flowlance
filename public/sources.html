<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body class="page-sources theme-hub">
    <div class="bg-blur"></div>

    <header class="navbar glass nav-hero-anim">

      <nav class="nav-menu nav-mega">
