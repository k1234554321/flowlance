<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowLance — Лидерборд</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      /* ——— Leaderboard styles ——— */
      .lb-hero {
        text-align: center;
        padding: 60px 0 40px;
      }
      .lb-title {
        font-family: 'Press Start 2P', monospace;
        font-size: clamp(18px, 3.5vw, 30px);
        color: #f5f5f0;
        margin-bottom: 14px;
        text-shadow: 0 0 30px rgba(0,242,255,0.4), 0 0 60px rgba(123,97,255,0.2);
        line-height: 1.4;
      }
      .lb-subtitle {
        color: #888880;
        font-size: 0.95rem;
        margin-bottom: 0;
      }

      /* ——— List ——— */
      .lb-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 32px;
      }

      .lb-row {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 20px;
        border-radius: 16px;
        background: rgba(255,255,255,0.025);
        border: 1px solid rgba(255,255,255,0.07);
        transition: transform 0.35s cubic-bezier(0.22,1,0.36,1), border-color 0.3s, box-shadow 0.35s;
      }
      .lb-row:hover {
        transform: translateY(-3px);
        border-color: rgba(255,255,255,0.14);
        box-shadow: 0 16px 40px rgba(0,0,0,0.4);
      }

      /* Top 3 special cards */
      .lb-row.rank-1 {
        background: rgba(255,215,0,0.06);
        border-color: rgba(255,215,0,0.25);
        box-shadow: 0 0 24px rgba(255,215,0,0.08);
      }
      .lb-row.rank-2 {
        background: rgba(192,192,192,0.05);
        border-color: rgba(192,192,192,0.2);
      }
      .lb-row.rank-3 {
        background: rgba(205,127,50,0.05);
        border-color: rgba(205,127,50,0.2);
      }

      .lb-rank {
        font-family: 'Press Start 2P', monospace;
        font-size: 0.85rem;
        min-width: 36px;
        text-align: center;
        flex-shrink: 0;
      }
      .lb-rank.rank-1 { color: #ffd700; font-size: 1rem; text-shadow: 0 0 12px rgba(255,215,0,0.6); }
      .lb-rank.rank-2 { color: #c0c0c0; font-size: 0.95rem; }
      .lb-rank.rank-3 { color: #cd7f32; font-size: 0.9rem; }
      .lb-rank.rank-other { color: #555550; }

      .lb-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        flex-shrink: 0;
        overflow: hidden;
        background: linear-gradient(135deg, #7b61ff, #00f2ff);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        font-weight: 700;
        color: #fff;
        text-transform: uppercase;
      }
      .lb-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .lb-info {
        flex: 1;
        min-width: 0;
      }
      .lb-username {
        font-weight: 600;
        color: #f5f5f0;
        font-size: 0.95rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .lb-meta {
        font-size: 0.8rem;
        color: #666660;
        margin-top: 2px;
      }

      .lb-badge {
        font-size: 0.72rem;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 6px;
        flex-shrink: 0;
        letter-spacing: 0.04em;
      }
      .lb-badge-pro {
        background: rgba(72,187,120,0.15);
        color: #48bb78;
        border: 1px solid rgba(72,187,120,0.3);
      }
      .lb-badge-proplus {
        background: rgba(159,122,234,0.15);
        color: #9f7aea;
        border: 1px solid rgba(159,122,234,0.3);
      }

      .lb-level {
        font-family: 'Press Start 2P', monospace;
        font-size: 0.75rem;
        color: #ffd700;
        text-shadow: 0 0 8px rgba(255,215,0,0.4);
        flex-shrink: 0;
        text-align: right;
        min-width: 60px;
      }
      .lb-level-label {
        font-family: 'Inter', sans-serif;
        font-size: 0.7rem;
        color: #555550;
        display: block;
        margin-top: 2px;
        font-family: inherit;
      }

      /* ——— Skeleton ——— */
      .lb-skeleton {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .lb-skeleton-row {
        height: 72px;
        border-radius: 16px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.05);
        animation: skeletonPulse 1.4s ease-in-out infinite;
      }
      @keyframes skeletonPulse {
        0%,100% { opacity: 0.5; }
        50% { opacity: 1; }
      }

      /* ——— Empty state ——— */
      .lb-empty {
        text-align: center;
        padding: 60px 20px;
        color: #555550;
        font-size: 0.95rem;
        line-height: 1.7;
      }
      .lb-empty-icon {
        font-size: 3rem;
        display: block;
        margin-bottom: 16px;
        filter: grayscale(1) opacity(0.4);
      }

      /* active nav pill */
      .active-pill { color: #f5f5f0 !important; border-color: rgba(255,255,255,0.2) !important; background: rgba(255,255,255,0.06) !important; }
    </style>
  </head>
  <body class="page-leaderboard theme-hub">
    <header class="navbar glass nav-hero-anim">
      <a class="logo" href="/">FLOW<span>LANCE</span></a>
      <nav class="nav-menu nav-mega">
        <a href="/" class="nav-pill">Главная</a>
        <a href="/feed" class="nav-pill">Лента</a>
        <a href="/sources" class="nav-pill">Биржи</a>
        <a href="/about" class="nav-pill">О сервисе</a>
        <a href="/tracker" class="nav-pill">Мои достижения</a>
        <a href="/pricing" class="nav-pill">Тарифы</a>
        <a href="/leaderboard" class="nav-pill active-pill">Лидерборд</a>
      </nav>
      <div class="nav-actions">
        <a href="/auth" class="btn btn-outline btn-small" id="nav-auth">Войти</a>
        <a href="/dashboard" class="btn btn-neon btn-glow btn-small hidden" id="nav-dash">Кабинет</a>
      </div>
    </header>

    <main style="width: min(800px, 94%); margin: 0 auto; padding-bottom: 80px;">

      <!-- Hero -->
      <section class="lb-hero reveal reveal-delay-1">
        <h1 class="lb-title">Лидерборд</h1>
        <p class="lb-subtitle">Топ фрилансеров по уровню трекера</p>
      </section>

      <!-- Leaderboard list -->
      <section class="reveal reveal-delay-2">
        <!-- Skeleton shown while loading -->
        <div class="lb-skeleton" id="lb-skeleton">
          <div class="lb-skeleton-row"></div>
          <div class="lb-skeleton-row"></div>
          <div class="lb-skeleton-row"></div>
          <div class="lb-skeleton-row"></div>
          <div class="lb-skeleton-row"></div>
        </div>

        <!-- Actual list (hidden until loaded) -->
        <div class="lb-list" id="lb-list" style="display:none;"></div>

        <!-- Empty state (hidden until loaded) -->
        <div class="lb-empty" id="lb-empty" style="display:none;">
          <span class="lb-empty-icon">🏆</span>
          Пока никого нет — войди в трекер и начни прокачку!
        </div>
      </section>

    </main>

    <script src="/js/page-enter.js"></script>
    <script src="/js/reveal-scroll.js"></script>
    <script src="/js/hub-effects.js"></script>
    <script src="/js/nav-session.js"></script>
    <script src="/js/ai-widget.js"></script>
    <script>
      (async function loadLeaderboard() {
        const skeleton = document.getElementById('lb-skeleton');
        const list = document.getElementById('lb-list');
        const empty = document.getElementById('lb-empty');

        try {
          const res = await fetch('/api/leaderboard');
          const data = await res.json();
          const users = Array.isArray(data.users) ? data.users : [];

          skeleton.style.display = 'none';

          if (users.length === 0) {
            empty.style.display = 'block';
            return;
          }

          list.style.display = 'flex';

          users.forEach((user, index) => {
            const rank = index + 1;
            const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';
            const rankSymbol = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;

            // Subscription badge + neon name for Pro+
            const sub = String(user.subscription || '').toLowerCase();
            let badgeHtml = '';
            let usernameStyle = 'font-weight:600;color:#f5f5f0;font-size:0.95rem;';
            if (sub === 'proplus') {
              badgeHtml = '<span class="lb-badge lb-badge-proplus">[PRO+]</span>';
              usernameStyle = 'font-weight:700;color:#9f7aea;font-size:0.95rem;text-shadow:0 0 12px rgba(159,122,234,0.8),0 0 24px rgba(159,122,234,0.4);';
            } else if (sub === 'pro') {
              badgeHtml = '<span class="lb-badge lb-badge-pro">[PRO]</span>';
            }

            // Avatar
            const initials = (user.name || 'U').slice(0, 2).toUpperCase();
            const avatarHtml = user.avatar_url
              ? `<div class="lb-avatar"><img src="${escapeHtml(user.avatar_url)}" alt="${escapeHtml(user.name || '')}" loading="lazy" /></div>`
              : `<div class="lb-avatar">${escapeHtml(initials)}</div>`;

            // Level & XP (placeholder values since DB doesn't have tracker columns yet)
            const level = user.tracker_level || 1;
            const xp = user.tracker_xp || 0;

            const row = document.createElement('div');
            row.className = `lb-row ${rankClass}`;
            row.innerHTML = `
              <div class="lb-rank ${rankClass}">${rankSymbol}</div>
              ${avatarHtml}
              <div class="lb-info">
                <div class="lb-username" style="${usernameStyle}">${escapeHtml(user.name || 'Пользователь')}</div>
                <div class="lb-meta">${xp.toLocaleString('ru-RU')} XP</div>
              </div>
              ${badgeHtml}
              <div class="lb-level">
                Lv.${level}
                <span class="lb-level-label">уровень</span>
              </div>
            `;
            list.appendChild(row);
          });

        } catch (err) {
          skeleton.style.display = 'none';
          empty.style.display = 'block';
          console.error('Leaderboard fetch error:', err);
        }
      })();

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }
    </script>
  </body>
</html>
