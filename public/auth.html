<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowLance — вход и регистрация</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="theme-hub">
    <div class="bg-blur"></div>
    <div class="bg-grid"></div>
    <div class="bg-orbs" aria-hidden="true"></div>
    <div class="noise-overlay" aria-hidden="true"></div>
    <header class="navbar glass nav-hero-anim">
      <a class="logo" href="/">FLOW<span>LANCE</span></a>
      <nav class="nav-menu nav-mega">
        <a href="/" class="nav-pill">Главная</a>
        <a href="/feed" class="nav-pill">Лента</a>
        <a href="/sources" class="nav-pill">Биржи</a>
        <a href="/about" class="nav-pill muted-link">О сервисе</a>
      </nav>
      <div class="nav-actions">
        <a href="/auth" class="btn btn-outline btn-small" id="nav-auth">Войти</a>
        <a href="/dashboard" class="btn btn-neon btn-glow btn-small hidden" id="nav-dash">Кабинет</a>
      </div>
    </header>

    <main class="section hub-section">
      <div class="auth-hero">
        <span class="section-kicker hero-load-1">Аккаунт</span>
        <h1 class="section-title-hub hero-load-2">Вход и регистрация</h1>
      </div>

      <section class="auth-layout">
        <div class="card glass reveal reveal-delay-1 auth-card" id="login-card">
          <h2>Вход</h2>
          <div class="auth-notice-slot" id="login-notice" aria-live="polite"></div>
          <form id="login-form" class="form-stack" novalidate>
            <input type="email" id="login-email" placeholder="Email" autocomplete="email" />
            <input type="password" id="login-password" placeholder="Пароль" autocomplete="current-password" />
            <button class="btn btn-search" type="submit">Войти</button>
          </form>
        </div>
        <div class="card glass reveal reveal-delay-2 auth-card" id="register-card">
          <h2>Регистрация</h2>
          <div class="auth-notice-slot" id="register-notice" aria-live="polite"></div>
          <form id="register-form" class="form-stack" novalidate>
            <input type="text" id="register-name" placeholder="Имя" autocomplete="name" />
            <input type="email" id="register-email" placeholder="Email" autocomplete="email" />
            <div class="pwd-field">
              <input type="password" id="register-password" placeholder="Пароль" autocomplete="new-password" />
              <div class="pwd-rules" id="pwd-rules" hidden>
                <p class="pwd-rules-title">Пароль должен содержать:</p>
                <ul class="pwd-rules-list" id="pwd-rules-list"></ul>
              </div>
            </div>
            <button class="btn btn-search" type="submit" id="register-submit">Создать аккаунт</button>
          </form>
        </div>
      </section>
    </main>

    <script src="/js/page-enter.js"></script>
    <script src="/js/reveal-scroll.js"></script>
    <script src="/js/hub-effects.js"></script>
    <script src="/js/nav-session.js"></script>
    <script src="/js/validation.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ai-widget.js"></script>
  </body>
</html>
